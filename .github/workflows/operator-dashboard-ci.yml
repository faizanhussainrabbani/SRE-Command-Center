name: operator-dashboard-ci

on:
  pull_request:
    paths:
      - artifacts/operator-dashboard/**
      - artifacts/api-server/src/routes/**
      - lib/api-spec/**
  push:
    branches:
      - main
    paths:
      - artifacts/operator-dashboard/**
      - artifacts/api-server/src/routes/**
      - lib/api-spec/**

jobs:
  validate-operator-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fullstackapp/SRE-Command-Center

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: fullstackapp/SRE-Command-Center/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run operator dashboard tests
        run: pnpm --filter @workspace/operator-dashboard test

      - name: Run operator dashboard lint
        run: pnpm --filter @workspace/operator-dashboard lint

      - name: Run operator dashboard typecheck
        run: pnpm --filter @workspace/operator-dashboard typecheck

      - name: Build operator dashboard
        run: pnpm --filter @workspace/operator-dashboard build
